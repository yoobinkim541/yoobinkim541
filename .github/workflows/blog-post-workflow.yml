name: Latest Blog Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write # 파일 쓰기 권한 명시

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS and Update README
        run: |
          # 1. RSS 가져오기 (User-Agent 필수)
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               "https://norepinephrine.tistory.com/rss" -o feed.xml
          
          # 2. 파이썬 실행
          python3 - << 'EOF'
          import xml.etree.ElementTree as ET
          import re
          import os
          import sys

          try:
              # XML 파싱
              tree = ET.parse('feed.xml')
              root = tree.getroot()
              items = root.findall('.//item')[:5]
              
              if not items:
                  print("알림: 블로그 글이 없거나 RSS를 읽지 못했습니다.")
                  sys.exit(0)

              # 새로운 내용 생성
              new_content = '\n'
              for item in items:
                  title = item.find('title').text.strip()
                  link = item.find('link').text.strip()
                  new_content += f'- <a href="{link}" target="_blank">{title}</a><br>\n'
              new_content += '\n'
              
              # README 읽기
              with open('README.md', 'r', encoding='utf-8') as f:
                  readme = f.read()
              
              start_tag = ''
              end_tag = ''
              
              # 태그 사이 내용 교체
              pattern = f"{re.escape(start_tag)}.*?{re.escape(end_tag)}"
              if re.search(pattern, readme, re.DOTALL):
                  updated_readme = re.sub(pattern, f"{start_tag}{new_content}{end_tag}", readme, flags=re.DOTALL)
                  with open('README.md', 'w', encoding='utf-8') as f:
                      f.write(updated_readme)
                  print("성공: README.md 업데이트 완료")
              else:
                  print("에러: README.md에 와 태그가 없습니다.")
                  sys.exit(1)
          except Exception as e:
              print(f"파이썬 에러 발생: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # 변경사항이 있을 때만 커밋
          if ! git diff --staged --quiet; then
            git commit -m "Update latest blog posts"
            git push
          else
            echo "변경사항이 없어 커밋을 건너뜁니다."
          fi
