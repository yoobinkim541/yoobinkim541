python3 -c "
          import xml.etree.ElementTree as ET
          import re
          import os

          try:
              # 1. RSS 피드 파싱 (최신 5개 추출)
              tree = ET.parse('feed.xml')
              root = tree.getroot()
              items = root.findall('.//item')[:5]
              
              new_content = '\n'
              for item in items:
                  title = item.find('title').text
                  link = item.find('link').text
                  # 가독성을 위해 불필요한 공백 제거 및 포맷팅
                  new_content += f'- <a href=\"{link.strip()}\" target=\"_blank\">{title.strip()}</a><br>\n'
              new_content += '\n'
              
              # 2. README.md 읽기
              with open('README.md', 'r', encoding='utf-8') as f:
                  readme = f.read()
              
              # 3. 정규표현식으로 주석 사이 내용 '완전히' 교체
              # 기존에 무엇이 들어있든 상관없이 START와 END 사이를 new_content로 치환합니다.
              start_tag = ''
              end_tag = ''
              pattern = re.compile(f'{re.escape(start_tag)}.*?{re.escape(end_tag)}', re.DOTALL)
              
              if re.search(pattern, readme):
                  updated_readme = pattern.sub(f'{start_tag}{new_content}{end_tag}', readme)
                  with open('README.md', 'w', encoding='utf-8') as f:
                      f.write(updated_readme)
                  print('Successfully updated README.md with top 5 posts.')
              else:
                  print('Error: Could not find feed tags in README.md')
                  
          except Exception as e:
              print(f'Error occurred: {e}')
          "
