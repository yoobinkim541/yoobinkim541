name: Latest Blog Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS and Update README
        run: |
          # 1. 티스토리 RSS를 브라우저인 척 위장하여 가져오기
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               "https://norepinephrine.tistory.com/rss" -o feed.xml
          
          # 2. XML에서 제목과 링크 추출 (최신 5개)
          # 파이썬을 활용해 안전하게 파싱합니다.
          python3 -c "
          import xml.etree.ElementTree as ET
          import re

          try:
              tree = ET.parse('feed.xml')
              root = tree.getroot()
              items = root.findall('.//item')[:5]
              
              new_content = '\n'
              for item in items:
                  title = item.find('title').text
                  link = item.find('link').text
                  new_content += f'- <a href=\"{link}\" target=\"_blank\">{title}</a><br>\n'
              
              with open('README.md', 'r', encoding='utf-8') as f:
                  readme = f.read()
              
              # 주석 사이의 내용을 교체
              pattern = r'().*?()'
              replacement = f'\\1{new_content}\\2'
              updated_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(updated_readme)
              print('Successfully updated README.md')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update latest blog posts"
          git push
