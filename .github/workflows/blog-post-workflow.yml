name: Latest Blog Posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS and Update README
        run: |
          # 1. 티스토리 RSS 가져오기 (브라우저 위장)
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               "https://norepinephrine.tistory.com/rss" -o feed.xml
          
          # 2. 파이썬으로 README 업데이트
          python3 -c "
          import xml.etree.ElementTree as ET
          import re

          try:
              # RSS 파싱 (최신 5개)
              tree = ET.parse('feed.xml')
              root = tree.getroot()
              items = root.findall('.//item')[:5]
              
              new_content = '\n'
              for item in items:
                  title = item.find('title').text.strip()
                  link = item.find('link').text.strip()
                  new_content += f'- <a href=\"{link}\" target=\"_blank\">{title}</a><br>\n'
              new_content += '\n'
              
              with open('README.md', 'r', encoding='utf-8') as f:
                  readme = f.read()
              
              # 🚨 태그를 정확하게 지정합니다.
              start_tag = ''
              end_tag = ''
              
              # 정규표현식으로 태그 사이 내용을 통째로 갈아끼웁니다.
              pattern = f'{re.escape(start_tag)}.*?{re.escape(end_tag)}'
              if re.search(pattern, readme, re.DOTALL):
                  updated_readme = re.sub(pattern, f'{start_tag}{new_content}{end_tag}', readme, flags=re.DOTALL)
                  with open('README.md', 'w', encoding='utf-8') as f:
                      f.write(updated_readme)
                  print('Successfully updated README.md')
              else:
                  print('Error: README.md에서 태그를 찾을 수 없습니다.')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update latest blog posts" && git push)
